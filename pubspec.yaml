name: el_asli
description: "VeryMed - Vérification authenticité médicaments"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Scan / Camera
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2

  # OCR - désactivé temporairement pour réduire taille APK
  # google_mlkit_text_recognition: ^0.13.1

  # Maps & Geolocation
  flutter_map: ^7.0.2
  flutter_map_marker_cluster: ^1.3.3
  latlong2: ^0.9.1
  geolocator: ^13.0.1

  # Voice / TTS / STT
  speech_to_text: ^7.0.0
  flutter_tts: ^4.1.0

  # HTTP
  http: ^1.2.2
  dio: ^5.7.0
  crypto: ^3.0.3

  # UI & UX
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  animate_do: ^3.3.4

  # Storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
